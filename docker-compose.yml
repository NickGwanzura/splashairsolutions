version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hvacops-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    networks:
      - hvacops-network
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http'); const opts={host:'localhost',port:3000,path:'/api/health',timeout:3000}; const req=http.request(opts,(res)=>{process.exit(res.statusCode===200?0:1)}); req.on('error',()=>process.exit(1)); req.end()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  hvacops-network:
    driver: bridge
